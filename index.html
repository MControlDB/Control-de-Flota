<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Control de Flota Remoto</title>
    <style>
        body { font-family: sans-serif; background: #f1f5f9; padding: 10px; }
        .categoria-section { background: white; margin-bottom: 20px; padding: 15px; border-radius: 8px; }
        .categoria-title { font-weight: bold; color: #334; border-bottom: 2px solid #eee; margin-bottom: 10px; }
        .tarjeta-equipo { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #f8f8f8; }
        .btn-estado { padding: 5px 10px; margin-left: 2px; border: 1px solid #ccc; cursor: pointer; }
        .activo { background-color: #22c55e !important; color: white; }
        .inactivo { background-color: #ef4444 !important; color: white; }
        .reserva { background-color: #eab308 !important; color: white; }
        .seguridad { background-color: #3b82f6 !important; color: white; }
    </style>
</head>
<body>
    <h1>Control de Flota Remoto</h1>
    
    <button onclick="sincronizarConHoja()" style="padding: 10px 20px; background: #2563eb; color: white; border: none; border-radius: 5px; cursor: pointer; margin-bottom: 15px;">
        🔄 Sincronizar Cambios con Hoja
    </button>

    <main id="pizarra-contenidos">Cargando...</main>

    <script>
        const URL_MESA_PUENTE = "https://script.google.com/macros/s/AKfycbybtkp6QDuSD8OfvR7y08bEW8jq22BxAD2tKAnzaTKCOeU9yT9GWABGzuSvUVmLHWji0g/exec";
        window.cambiosPendientes = {};

        function cargarDatos() {
            const script = document.createElement('script');
            script.src = URL_MESA_PUENTE + "?callback=renderizar";
            document.body.appendChild(script);
        }

        function renderizar(equipos) {
            const contenedor = document.getElementById('pizarra-contenidos');
            contenedor.innerHTML = "";
            const agrupado = equipos.reduce((acc, eq) => {
                (acc[eq.grupo] = acc[eq.grupo] || []).push(eq);
                return acc;
            }, {});

            for (const [nombre, lista] of Object.entries(agrupado)) {
                let html = `<section class="categoria-section"><div class="categoria-title">${nombre.toUpperCase()}</div>`;
                lista.forEach(eq => {
                    html += `
                        <div class="tarjeta-equipo" data-id="${eq.id}">
                            <div><strong>${eq.id}</strong><br><small>${eq.modelo}</small></div>
                            <div class="botones-container">
                                <button class="btn-estado ${eq.estado === 'Activo' ? 'activo' : ''}" onclick="cambiarEstadoLocal('${eq.id}', 'Activo', this)">A</button>
                                <button class="btn-estado ${eq.estado === 'Inactivo' ? 'inactivo' : ''}" onclick="cambiarEstadoLocal('${eq.id}', 'Inactivo', this)">I</button>
                                <button class="btn-estado ${eq.estado === 'Reserva' ? 'reserva' : ''}" onclick="cambiarEstadoLocal('${eq.id}', 'Reserva', this)">R</button>
                                <button class="btn-estado ${eq.estado === 'Seguridad' ? 'seguridad' : ''}" onclick="cambiarEstadoLocal('${eq.id}', 'Seguridad', this)">S</button>
                            </div>
                        </div>`;
                });
                contenedor.innerHTML += html + "</section>";
            }
        }

        function cambiarEstadoLocal(id, nuevoEstado, btnElement) {
            // Guardar en cola
            window.cambiosPendientes[id] = nuevoEstado;
            
            // Cambio visual inmediato
            const contenedor = btnElement.parentElement;
            contenedor.querySelectorAll('button').forEach(b => b.style.border = "1px solid #ccc");
            btnElement.style.border = "3px solid black";
            alert("Estado " + nuevoEstado + " seleccionado (Pendiente de sincronizar)");
        }

        async function sincronizarConHoja() {
            const IDs = Object.keys(window.cambiosPendientes);
            if (IDs.length === 0) { alert("No hay cambios pendientes"); return; }
            
            alert("Sincronizando...");
            for (let id of IDs) {
                let estado = window.cambiosPendientes[id];
                // Usamos fetch con modo no-cors para evitar el error de servidor
                await fetch(URL_MESA_PUENTE + `?id=${encodeURIComponent(id)}&estado=${encodeURIComponent(estado)}`, { method: 'POST', mode: 'no-cors' });
            }
            window.cambiosPendientes = {};
            alert("Sincronización completa");
            cargarDatos();
        }

        cargarDatos();
    </script>
</body>
</html>
