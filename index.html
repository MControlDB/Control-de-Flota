<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Flota Remoto</title>
    <style>
        body { font-family: sans-serif; background: #f1f5f9; padding: 10px; }
        .categoria-section { background: white; margin-bottom: 20px; padding: 15px; border-radius: 8px; }
        .categoria-title { font-weight: bold; color: #334; border-bottom: 2px solid #eee; margin-bottom: 10px; }
        .tarjeta-equipo { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #f8f8f8; }
        .btn-estado { padding: 5px 10px; margin-left: 2px; border: 1px solid #ccc; cursor: pointer; }
        /* Colores de estado */
        .activo { background-color: #22c55e; color: white; }        /* Verde */
.inactivo { background-color: #ef4444; color: white; }      /* Rojo */
.reserva { background-color: #eab308; color: white; }      /* Amarillo */
.seguridad { background-color: #3b82f6; color: white; }    /* Azul */
.btn-estado { border: 1px solid #ccc; cursor: pointer; padding: 5px 8px; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>Control de Flota Remoto</h1>
    <div id="resumen-container"></div>
    <main id="pizarra-contenidos">Cargando...</main>

    <script>
        const URL_MESA_PUENTE = "https://script.google.com/macros/s/AKfycbybtkp6QDuSD8OfvR7y08bEW8jq22BxAD2tKAnzaTKCOeU9yT9GWABGzuSvUVmLHWji0g/exec";

        function cargarDatos() {
            const script = document.createElement('script');
            script.src = URL_MESA_PUENTE + "?callback=renderizar";
            document.body.appendChild(script);
        }

        function renderizar(equipos) {
    const contenedor = document.getElementById('pizarra-contenidos');
    contenedor.innerHTML = "";
    
    const agrupado = equipos.reduce((acc, eq) => {
        (acc[eq.grupo] = acc[eq.grupo] || []).push(eq);
        return acc;
    }, {});

    for (const [nombre, lista] of Object.entries(agrupado)) {
        let html = `<section class="categoria-section"><div class="categoria-title">${nombre.toUpperCase()}</div>`;
        lista.forEach(eq => {
            // Asignamos la clase según el estado
            const cls = eq.estado.toLowerCase(); // 'activo', 'inactivo', 'reserva', 'seguridad'
            
            html += `
                <div class="tarjeta-equipo">
                    <div><strong>${eq.id}</strong><br><small>${eq.modelo}</small></div>
                    <div>
                        <button class="btn-estado ${eq.estado === 'Activo' ? 'activo' : ''}" onclick="enviarEstado('${eq.id}', 'Activo')">A</button>
                        <button class="btn-estado ${eq.estado === 'Inactivo' ? 'inactivo' : ''}" onclick="enviarEstado('${eq.id}', 'Inactivo')">I</button>
                        <button class="btn-estado ${eq.estado === 'Reserva' ? 'reserva' : ''}" onclick="enviarEstado('${eq.id}', 'Reserva')">R</button>
                        <button class="btn-estado ${eq.estado === 'Seguridad' ? 'seguridad' : ''}" onclick="enviarEstado('${eq.id}', 'Seguridad')">S</button>
                    </div>
                </div>`;
        });
        contenedor.innerHTML += html + "</section>";
    }
}

        function enviarEstado(id, nuevoEstado) {
            const form = document.createElement('form');
            form.method = 'POST';
            form.action = URL_MESA_PUENTE + `?id=${encodeURIComponent(id)}&estado=${encodeURIComponent(nuevoEstado)}`;
            document.body.appendChild(form);
            form.submit();
            alert("Actualizando...");
            setTimeout(cargarDatos, 1500);
        }

        cargarDatos();
    </script>
</body>
</html>
