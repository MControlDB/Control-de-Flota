<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, maximum-scale=1.0, user-scalable=no">
    <title>Pizarra Flota Móvil - Sincronizada</title>
    <style>
        :root {
            --bg-activo: #2ecc71;
            --bg-inactivo: #e74c3c;
            --bg-seguridad: #f1c40f;
            --bg-reserva: #34495e;
            --primary-color: #0f172a;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #f1f5f9;
            color: #1e293b;
            margin: 0;
            padding: 10px;
        }

        header {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 10px 5px;
            border-bottom: 2px solid #cbd5e1;
            margin-bottom: 15px;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 { font-size: 1.2rem; margin: 0; color: var(--primary-color); }
        
        .contador-total {
            font-size: 0.85rem;
            background: #cbd5e1;
            color: #334155;
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: bold;
        }

        .panel-acciones {
            display: flex;
            gap: 8px;
            width: 100%;
        }

        .btn-accion {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            color: white;
        }

        .btn-guardar { background-color: #2563eb; }
        .btn-guardar:disabled { background-color: #94a3b8; cursor: not-allowed; }

        .resumen-container {
            background: #ffffff;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            border: 1px solid #e2e8f0;
        }
